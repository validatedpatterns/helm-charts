quay:
  namespace: quay-enterprise
  configBundleSecret:
    deploy: true
    name: quay-init-config-bundle-secret
  setup:
    admin:
      name: quayadmin
      email: quayadmin@example.com
    user:
      name: developer1
      email: developer1@myorg.com
  storage:
    postgres:
      size: 50Gi # Default and minimum size is 50 Gi
    clairpostgres:
      size: 50Gi # Default and minimum size is 50 Gi

job:
  # Use a version tag; avoid :latest for production (CKV_K8S_14)
  image: registry.redhat.io/openshift4/ose-cli:4.15
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

quay_config:
  org:
    name: devel
    email: devel@myorg.com
  repo: example

# Object Storage configuration - using NooBaa MCG
objectStorage:
  objectBucketClaim:
    name: quay-bucket
    bucketName: quay-datastore
    storageClass: openshift-storage.noobaa.io
