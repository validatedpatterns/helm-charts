---
# -- Settings for SecretProviderClass + workload ServiceAccount used with Vault CSI
# @default -- see nested keys
ocpSecretsStoreCsiVault:
  secretProviderClass:
    # -- When true with `enabled`, render sync TLS ConfigMap (when configured), SecretProviderClass, and workload RBAC from this chart (standalone install). When `enabled` is false, renders nothing from this path. Consuming charts typically set this false and use `include` on the named templates instead.
    installDefaultManifests: false
    # -- Create the SecretProviderClass (used by named template and by installDefaultManifests)
    enabled: true
    # -- metadata.name of the SecretProviderClass (referenced from pod volumeAttributes)
    name: vault-hub-secrets

  rbac:
    # -- Vault Kubernetes auth role name when running on the hub (or when local Vault is used)
    rolename: "hub-role"
    serviceAccount:
      # -- If false, only ClusterRoleBinding is rendered; use an existing SA (e.g. parent chart workload SA)
      create: true
      # -- ServiceAccount pods must use so Vault role bindings match
      name: "ocp-sscsi-vault"
      # -- Namespace for SA, token Secret, SecretProviderClass, and typical workloads
      namespace: "openshift-sscsi-vault-demo"

  vault:
    # -- If non-empty, used as spec.parameters.vaultAddress (e.g. https://vault.example.com for an external Vault). When empty, the default hub route https://vault-vault.<global.hubClusterDomain> is used.
    externalAddress: ""
    # -- Vault Kubernetes auth mount path on the hub (Validated Patterns default)
    hubMountPath: "hub"

  # -- Mirrors openshift-external-secrets-chart `ocpExternalSecrets.caProvider`: when enabled and `tls.vaultCACertPath` is empty, `vaultCACertPath` is chosen from `syncProviderCaConfigMap` (default: CNO-injected cluster trust at `mountDir`/`trustedCabundleDataKey`) or else hub/spoke `defaultVaultCACertPath` when sync is disabled. CSI reads a PEM path on the Vault CSI provider pod. Nested: `syncProviderCaConfigMap`, `hostCluster`, `clientCluster`.
  caProvider:
    # -- When false, `vaultCACertPath` is omitted unless `tls.vaultCACertPath` is set (same idea as ESO omitting `caProvider` when disabled).
    enabled: true
    # -- TLS CA for Vault HTTPS when `tls.vaultSkipTLSVerify` is `"false"`: by default the chart emits a CNO-injected trusted CA ConfigMap (`injectTrustedCabundle`) so `vaultCACertPath` uses the cluster merged bundle (`trustedCabundleDataKey`). For the legacy **rhvp.cluster_utils** Ansible PEM ConfigMap (`vault-tls-ca.pem`), set `injectTrustedCabundle: false`, `createConfigMap: false`, and keep `keyInConfigMap` aligned with Ansible; or disable Ansible route CM injection if this chart owns the same `configMapName`. See chart README.
    syncProviderCaConfigMap:
      # -- When true with `tls.vaultCACertPath` empty, set SPC `vaultCACertPath` to `mountDir`/`keyInConfigMap` (trust bundle on the Vault CSI provider pod). When `createConfigMap` is true and PEM is available, or `injectTrustedCabundle` is true, also render a ConfigMap manifest (PEM vs injection modes are mutually exclusive).
      enabled: true
      # -- When true with `createConfigMap` true (default), render a ConfigMap with label `config.openshift.io/inject-trusted-cabundle: "true"` and empty `data` so the Cluster Network Operator injects the cluster-wide merged CA bundle (system + Proxy trustedCA). Argo-safe without `lookup`/`pemLiteral`. Sets `vaultCACertPath` to `mountDir`/`trustedCabundleDataKey` (default `ca-bundle.crt`). Mutually exclusive with rendered PEM content; set `injectTrustedCabundle: false` to use PEM/`lookup` or an out-of-band ConfigMap.
      injectTrustedCabundle: true
      # -- Data key populated by OpenShift after injection (see "Certificate injection using Operators" / custom PKI docs). Used for `vaultCACertPath` when `injectTrustedCabundle` is true.
      trustedCabundleDataKey: ca-bundle.crt
      # -- When `injectTrustedCabundle` and this chart renders the TLS ConfigMap: set `argocd.argoproj.io/ignore-differences` to a JSON pointer `/data/<trustedCabundleDataKey>` so Argo CD can skip drift on CNO-managed content (requires Argo CD / OpenShift GitOps that honors per-resource ignore-differences, or duplicate the rule under the Application `spec.ignoreDifferences`; see README).
      argocdIgnoreInjectedTrustedCabundleData: true
      # -- Extra annotations merged onto the rendered sync TLS ConfigMap (overrides `argocdIgnoreInjectedTrustedCabundleData` annotation keys when the same key is set).
      configMapAnnotations: {}
      # -- Inline PEM (full bundle). GitOps-friendly: SOPS-encrypted values, Argo CD helm parameters, or a pattern override file. When set, used instead of cluster lookup for CM content when `createConfigMap` is true.
      pemLiteral: ""
      # -- When true, use helm lookup() against the live API (hub ingress CA, ESO-style hub-ca, etc.). False by default because Argo CD client-side render has no API.
      useLookup: false
      # -- When true (default with `injectTrustedCabundle`), Helm emits the ConfigMap (injection-labeled or PEM from `pemLiteral`/`useLookup`). When false, GitOps/Ansible must create `configMapName`; SPC still uses `mountDir`/`keyInConfigMap` unless `injectTrustedCabundle` is true (then `trustedCabundleDataKey`).
      createConfigMap: true
      # -- Namespace for the synced ConfigMap when `createConfigMap` is true (Vault CSI provider namespace in typical patterns).
      targetNamespace: vault
      # -- ConfigMap name; must match **rhvp.cluster_utils** `vault_ss_csi_route_ca_configmap_name` default (`openshift-sscsi-vault-vault-tls-ca`).
      configMapName: openshift-sscsi-vault-vault-tls-ca
      # -- Directory on the Vault CSI provider pod where the ConfigMap is mounted (must match HashiCorp Vault chart `csi.volumeMounts`).
      mountDir: /etc/pki/vault-ca
      # -- Key within the ConfigMap whose value is the PEM file; must match **rhvp.cluster_utils** `vault_ss_csi_route_ca_configmap_key` default (`vault-tls-ca.pem`).
      keyInConfigMap: vault-tls-ca.pem
      # -- Preset for `useLookup` only: `auto` (hub vs spoke), `ingressrouterca`, `esohubkuberootca`, `esospokehubca`.
      preset: auto
      # -- Router CA ConfigMap reference when preset resolves to ingress router CA (`useLookup` path).
      ingressRouterCa:
        namespace: openshift-ingress
        name: router-ca
        key: ca-bundle.crt
    hostCluster:
      type: ConfigMap
      name: kube-root-ca.crt
      key: ca.crt
      namespace: external-secrets
      # -- PEM path on the Vault CSI provider when hub-style auth (hub cluster or spoke with hashicorp-vault app)
      defaultVaultCACertPath: /etc/pki/vault-ca/kube-root-ca.crt
    clientCluster:
      type: Secret
      name: hub-ca
      key: hub-kube-root-ca.crt
      namespace: external-secrets
      defaultVaultCACertPath: /etc/pki/vault-ca/hub-kube-root-ca.crt

  # -- KV objects to expose as files under the CSI mount (Vault CSI `objects` list)
  # @default -- example placeholder; replace with your paths
  objects:
    - objectName: "example-password"
      secretPath: "secret/data/example/app"
      secretKey: "password"

  # -- Optional: sync mounted objects into native Kubernetes Secrets (CSI secretObjects)
  secretObjects: []

  # -- TLS options for the Vault CSI provider (see HashiCorp vault-csi-provider docs). When `vaultSkipTLSVerify` is `"true"`, `vaultCACertPath` is not emitted (verify is off).
  tls:
    # -- Pass through to the vault-csi-provider as `vaultSkipTLSVerify` (`"true"` / `"false"` strings).
    vaultSkipTLSVerify: "false"
    # -- If set, passed as vaultCACertPath (must exist where the CSI provider can read it). When empty and `caProvider.enabled`, uses `syncProviderCaConfigMap` mount path when sync is enabled, else hub/spoke `defaultVaultCACertPath`.
    vaultCACertPath: ""
    # -- Optional SNI override for Vault HTTPS (`vaultTLSServerName` in the SPC).
    vaultTLSServerName: ""

# -- Global values aligned with openshift-external-secrets chart patterns
global:
  hubClusterDomain: hub.example.com
  clusterDomain: foo.example.com
  localClusterDomain: ""

clusterGroup:
  applications: {}
