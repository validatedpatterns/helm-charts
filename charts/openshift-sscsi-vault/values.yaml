---
# -- Settings for SecretProviderClass + workload ServiceAccount used with Vault CSI
# @default -- see nested keys
ocpSecretsStoreCsiVault:
  secretProviderClass:
    # -- When true, render SecretProviderClass + RBAC from this chart's templates (standalone install).
    # Consuming charts typically set this false and use `include` on the named templates instead.
    installDefaultManifests: false
    # -- Create the SecretProviderClass (used by named template and by installDefaultManifests)
    enabled: true
    # -- metadata.name of the SecretProviderClass (referenced from pod volumeAttributes)
    name: vault-hub-secrets

  rbac:
    # -- Vault Kubernetes auth role name when running on the hub (or when local Vault is used)
    rolename: "hub-role"
    serviceAccount:
      # -- If false, only ClusterRoleBinding is rendered; use an existing SA (e.g. parent chart workload SA)
      create: true
      # -- ServiceAccount pods must use so Vault role bindings match
      name: "ocp-sscsi-vault"
      # -- Namespace for SA, token Secret, SecretProviderClass, and typical workloads
      namespace: "openshift-sscsi-vault-demo"

  vault:
    # -- If non-empty, used as spec.parameters.vaultAddress (e.g. https://vault.example.com for an external Vault). When empty, the default hub route https://vault-vault.<global.hubClusterDomain> is used.
    externalAddress: ""
    # -- Vault Kubernetes auth mount path on the hub (Validated Patterns default)
    hubMountPath: "hub"

  # -- Mirrors openshift-external-secrets-chart `ocpExternalSecrets.caProvider`: when enabled and `tls.vaultCACertPath` is empty, `vaultCACertPath` defaults per hub vs spoke (same branching as ESO). CSI reads a PEM path on the Vault CSI provider pod; `defaultVaultCACertPath` should match where you mount the same trust material as the type/name/key/namespace objects below. Nested: `syncProviderCaConfigMap`, `hostCluster`, `clientCluster`.
  caProvider:
    # -- When false, `vaultCACertPath` is omitted unless `tls.vaultCACertPath` is set (same idea as ESO omitting `caProvider` when disabled).
    enabled: true
    # -- TLS CA sync for Vault HTTPS: `pemLiteral` / `createConfigMap` for GitOps; optional `lookup` when `useLookup` is true. See chart README (Argo CD section).
    syncProviderCaConfigMap:
      # -- When true, emit a ConfigMap (unless `createConfigMap` is false) when PEM is available, and set SPC `vaultCACertPath` for the mount path under `mountDir`.
      enabled: false
      # -- Inline PEM (full bundle). GitOps-friendly: SOPS-encrypted values, Argo CD helm parameters, or a pattern override file. When set, used instead of cluster lookup.
      pemLiteral: ""
      # -- When true, use helm lookup() against the live API (hub ingress CA, ESO-style hub-ca, etc.). False by default because Argo CD client-side render has no API.
      useLookup: false
      # -- When false, this chart does not create the ConfigMap; create and mount it elsewhere. SPC still receives `vaultCACertPath` at `mountDir`/`keyInConfigMap` when sync is enabled.
      createConfigMap: true
      # -- Namespace for the synced ConfigMap (pattern: `vault` where the Vault CSI provider runs). The release ServiceAccount must be allowed to create ConfigMaps here unless you manage the CM out-of-band.
      targetNamespace: vault
      # -- ConfigMap name to create or reference; mount this name on the Vault CSI provider DaemonSet.
      configMapName: openshift-sscsi-vault-vault-tls-ca
      # -- Directory on the Vault CSI provider pod where the ConfigMap is mounted (must match HashiCorp Vault chart `csi.volumeMounts`).
      mountDir: /etc/pki/vault-ca
      # -- Key within the ConfigMap whose value is the PEM file (single file item in the volume).
      keyInConfigMap: vault-tls-ca.pem
      # -- Preset for `useLookup` only: `auto` (hub vs spoke), `ingressrouterca`, `esohubkuberootca`, `esospokehubca`.
      preset: auto
      # -- Router CA ConfigMap reference when preset resolves to ingress router CA (`useLookup` path).
      ingressRouterCa:
        namespace: openshift-ingress
        name: router-ca
        key: ca-bundle.crt
    hostCluster:
      type: ConfigMap
      name: kube-root-ca.crt
      key: ca.crt
      namespace: external-secrets
      # -- PEM path on the Vault CSI provider when hub-style auth (hub cluster or spoke with hashicorp-vault app)
      defaultVaultCACertPath: /etc/pki/vault-ca/kube-root-ca.crt
    clientCluster:
      type: Secret
      name: hub-ca
      key: hub-kube-root-ca.crt
      namespace: external-secrets
      defaultVaultCACertPath: /etc/pki/vault-ca/hub-kube-root-ca.crt

  # -- KV objects to expose as files under the CSI mount (Vault CSI `objects` list)
  # @default -- example placeholder; replace with your paths
  objects:
    - objectName: "example-password"
      secretPath: "secret/data/example/app"
      secretKey: "password"

  # -- Optional: sync mounted objects into native Kubernetes Secrets (CSI secretObjects)
  secretObjects: []

  # -- TLS options for the Vault CSI provider (see HashiCorp vault-csi-provider docs). When `vaultSkipTLSVerify` is `"true"`, `vaultCACertPath` is not emitted (verify is off).
  tls:
    # -- Pass through to the vault-csi-provider as `vaultSkipTLSVerify` (`"true"` / `"false"` strings).
    vaultSkipTLSVerify: "false"
    # -- If set, passed as vaultCACertPath (must exist where the CSI provider can read it). When empty and `caProvider.enabled`, defaults to `caProvider.hostCluster.defaultVaultCACertPath` or `caProvider.clientCluster.defaultVaultCACertPath` by hub/spoke (mirrors ESO ClusterSecretStore caProvider branch).
    vaultCACertPath: ""
    # -- Optional SNI override for Vault HTTPS (`vaultTLSServerName` in the SPC).
    vaultTLSServerName: ""

# -- Global values aligned with openshift-external-secrets chart patterns
global:
  hubClusterDomain: hub.example.com
  clusterDomain: foo.example.com
  localClusterDomain: ""

clusterGroup:
  applications: {}
