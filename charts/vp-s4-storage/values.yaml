---
# External Secrets Operator store (OpenShift Validated Patterns / Vault)
secretStore:
  name: vault-backend
  kind: ClusterSecretStore

# Kubernetes Secret for the s4 subchart (one ExternalSecret, two Vault paths via dataFrom)
s4Credentials:
  secretName: s4-credentials

# Vault: Web UI login (UI_USERNAME, UI_PASSWORD [, JWT_SECRET])
s4UICredentials:
  vaultKey: "secret/data/global/s4-ui-credentials"

# Vault: S3 API (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) — RGW, bucket Jobs, app consumers
s4APICredentials:
  vaultKey: "secret/data/global/s4-api-credentials"

# Upstream s4 subchart (https://github.com/rh-aiservices-bu/s4) — defaults target OpenShift
s4:
  image:
    repository: quay.io/rh-aiservices-bu/s4
    # Pin to chart appVersion for reproducible OpenShift deployments (not :latest)
    tag: "0.3.2"
    pullPolicy: IfNotPresent

  s3:
    existingSecret: s4-credentials

  auth:
    enabled: true
    # Edge-terminated Routes present HTTPS to the browser; keep secure cookies enabled
    cookieRequireHttps: true

  storage:
    data:
      size: 10Gi
      # Empty storageClass uses the cluster default StorageClass (typical on OpenShift)
      storageClass: ""
      accessMode: ReadWriteOnce
    localStorage:
      enabled: false

  service:
    type: ClusterIP
    nodePort:
      enabled: false

  ingress:
    enabled: false
    s3Api:
      enabled: false

  route:
    enabled: true
    annotations:
      # Allow large object uploads through the OpenShift router
      haproxy.router.openshift.io/timeout: 600s
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
    s3Api:
      enabled: true
      annotations:
        haproxy.router.openshift.io/timeout: 600s
      tls:
        termination: edge
        # Allow HTTP on router port 80 (HTTPS on 443 still available with edge termination)
        insecureEdgeTerminationPolicy: Allow

  serviceAccount:
    create: true

  # Argo CD sync order: ExternalSecrets/validation (1), bucket ConfigMap (2), S4 workload (2), bootstrap (3), CronJob (5)
  commonAnnotations:
    argocd.argoproj.io/sync-wave: "2"

  podSecurityContext:
    runAsNonRoot: true

  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

# S4 bucket provisioning (playbook adapted from https://github.com/eduffy-redhat/s4-role)
s4Role:
  # Bucket names passed into the Job/CronJob and applied via the mounted playbook
  buckets: []
  destroy: false
  endpoint:
    protocol: http
    port: 7480
    # Defaults to the in-cluster S4 Service DNS name when empty
    address: ""

serviceAccountName: vp-s4-storage-sa
# Set to the target OpenShift namespace in the pattern values overlay (same as Argo CD app namespace)
serviceAccountNamespace: ""

configJob:
  disabled: false
  image: quay.io/validatedpatterns/utility-container:latest
  imagePullPolicy: IfNotPresent
  schedule: "10 */2 * * *"
  activeDeadlineSeconds: 3600
  configTimeout: 1800
  s4ReadyTimeoutSeconds: 600

validationJob:
  disabled: false
  activeDeadlineSeconds: 3600

# OpenShift console Application menu link to the S4 Web UI Route (enabled by default when the Route is enabled)
consoleLink:
  enabled: true
  text: S4 Web UI
  section: Storage
  # Full https URL override; otherwise uses s4.route.host or {route}-{namespace}.{ingress-domain}
  href: ""
  # Optional override; when empty, uses global.localClusterDomain (Validated Patterns)
  ingressDomain: ""
  # Defaults to bundled assets/s4-icon-64x64.png from https://github.com/rh-aiservices-bu/s4
  imageURL: ""

vp-rbac:
  serviceAccounts:
    vp-s4-storage-sa:
      namespace: ""
      roleBindings:
        roles:
          - external-secrets-validator
        clusterRoles: []

  roles:
    external-secrets-validator:
      namespace: ""
      rules:
        - apiGroups: ["external-secrets.io", ""]
          resources: ["externalsecrets", "secrets"]
          verbs: ["get", "list", "watch"]
