# See README "Injecting extra CA material (additionalCaBundles)" for Git-friendly PEM injection and CNO/Vault notes.
# -- PEM strings merged into the gather bundle before fingerprint de-duplication; see README Overview "Injecting extra CA material".
additionalCaBundles: []

# ACM Policy + PlacementBinding (default on when acm.enabled): Governance / console visibility for Proxy trustedCA vs configMapName.
# Templates render only if acm.enabled is true; set acm.enabled false for standalone OpenShift (hub-only gather).
# Recommended to keep enabled so ACM shows per-cluster compliance alongside ManifestWork rollout (Policy does not gate MW).
# If Placement selects zero clusters, hub Policy status may stay empty while MW still applies the bundle—fix Placement/bindings.
# The Job/CronJob owns ConfigMap content; Policy reports whether spokes keep Proxy trustedCA pointed at that ConfigMap name.
# When policy.createPlacement is true, the chart applies Placement (default cluster set "global").
# ManagedClusterSetBinding is optional (policy.createManagedClusterSetBindings); default false for GitOps.
# Set createPlacement false if you manage Placement yourself.
# Hub Policy status.complianceState stays empty while Placement selects zero clusters (propagator behavior).
# Default remediation is inform: GRC shows per-cluster compliance and violation detail without the policy
# controller fighting ManifestWork over the same Proxy object. Use enforce only if ManifestWork does not patch Proxy.
policy:
  # -- Enable ACM Policy + PlacementBinding for Governance/GRC console visibility of Proxy trustedCA vs configMapName (does not gate ManifestWork).
  enabled: true
  # Base namespace for ACM policy workspace when placementRef.namespace is empty.
  hubNamespace: open-cluster-management
  # -- Hub Policy metadata.name; empty uses vpca-<truncated Release.Name> so len(namespace)+len(name)<=62 (ACM webhook).
  name: ""
  # -- Shown in ACM Governance as policy description (annotation policy.open-cluster-management.io/description).
  description: >-
    Ensures OpenShift Proxy/cluster spec.trustedCA.name matches the merged cluster-wide CA bundle
    ConfigMap (values.configMapName). Default remediation is inform so GRC shows compliance and cluster
    violations without competing with this chart's ManifestWork on the same Proxy object.
  # -- inform (default): report compliance and violations in ACM; ManifestWork applies Proxy. enforce: policy controller also remediates Proxy—avoid with manifestWork.patchClusterProxy true unless you accept two writers.
  remediationAction: inform
  # -- NonCompliant message in GRC / cluster violations detail (ConfigurationPolicy spec.customMessage).
  configurationCustomMessage: >-
    Proxy/cluster spec.trustedCA.name must match the merged CA bundle ConfigMap (see chart values.configMapName).
    When NonCompliant, fix ManifestWork rollout or gather output; this policy is inform-only by default so it does not apply Proxy.
  createPlacement: true
  # -- When false (default), chart does not render ManagedClusterSetBinding; bind policy.placement.clusterSets in the policy workspace via a platform GitOps app. Set true if this chart should own those bindings.
  createManagedClusterSetBindings: false
  placementRef:
    # Default Placement name created when policy.createPlacement is true; override if you use your own Placement.
    name: vp-proxy-ca
    # When non-empty, Policy, PlacementBinding, Placement, and ManagedClusterSetBinding use this namespace
    # (PlacementBinding cannot reference a Placement in another namespace). Empty uses policy.hubNamespace.
    namespace: ""
  placement:
    # ManagedClusterSets to bind into hubNamespace and to select from (requires clusters to be members of these sets).
    # Default "global" is the ACM default set that contains all managed clusters on typical installs.
    clusterSets:
      - global

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Pod-level security. runAsNonRoot requires a numeric runAsUser when the image USER is non-numeric (e.g. root).
# runAsUser must fall within your namespace SCC UID range (oc get namespace <ns> -o jsonpath='{.metadata.annotations.openshift\.io/sa\.scc\.uid-range}').
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000690001
  runAsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
