---
# Hub namespace for the CronJob/Job, RBAC, script ConfigMap, and optional additional-ca Secret.
namespace: openshift-config

# When false, skip ACM APIs (ManagedCluster, ManifestWork), Governance Policy, and spoke-push agents.
# The gather job only merges hub API CAs (+ optional ingress + optional system trust + additionalCaBundles)
# and applies ConfigMap + Proxy/cluster on this cluster (local hub only).
# Default true: multicluster rollout and policy match an ACM hub.
acm:
  # -- When false, hub-only proxy CA (no multicluster); policy.* and spokePush hub assets are not applied.
  enabled: true

nameOverride: ""
fullnameOverride: ""

image:
  repository: quay.io/validatedpatterns/imperative-container
  tag: latest
  pullPolicy: IfNotPresent

# ConfigMap in openshift-config holding ca-bundle.crt for cluster Proxy trustedCA.
# Use a distinct name if another chart (e.g. opp-policy) already owns cluster-proxy-ca-bundle.
configMapName: vp-pattern-proxy-ca-bundle
targetNamespace: openshift-config

serviceAccount:
  create: true
  name: ""

# Run aggregation on a schedule; set suspend true to disable periodic runs.
cronJob:
  enabled: true
  suspend: false
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3

# One-shot Job on helm install/upgrade (runs after templates apply).
syncJob:
  enabled: true

# Optional: oc --selector when listing ManagedCluster objects (empty = all clusters).
managedClusterLabelSelector: ""
# Space-separated ManagedCluster names to skip. Default empty: every listed cluster receives the merged
# bundle and Proxy ManifestWork (hub is still updated directly by the job). Set e.g. local-cluster only if
# you intentionally skip that MC and rely on hub-only apply for it.
excludeManagedClusters: ""

# How to read trust material for each ManagedCluster:
# - spokePush (default): each spoke runs a CronJob (ManifestWork) that pushes API CAs (+ optional ingress, + optional system trust)
#   into ConfigMaps in spokePush.hubNamespace on the hub; the gather job reads all bundle-* ConfigMaps.
# - acm: spec.managedClusterClientConfigs[].caBundle on ManagedCluster (hub API only; plus optional pull of ingress/system trust when kubeconfig exists).
# - spokeTrustedCaBundle: fetch API CAs (+ optional ingress, + optional system trust) via import kubeconfig.
managedClusterCaSource: spokePush

# When managedClusterCaSource is spokePush: hub namespace for per-cluster ConfigMaps (bundle-<cluster>).
spokePush:
  hubNamespace: vp-proxy-ca-bundles
  spokeNamespace: vp-proxy-ca-sync
  schedule: "*/10 * * * *"
  manifestWorkNameOverride: ""
  # Max duration for hub tokens embedded in spoke push Secrets (oc create token --duration).
  tokenDuration: 720h
  # -- Hub API URL embedded in spoke push Secrets (reachable from every spoke). Empty: kubeconfig cluster.server, else OpenShift `Infrastructure/cluster` status.apiServerURL, else `https://KUBERNETES_SERVICE_HOST:PORT`.
  hubApiServer: ""

# Primary spoke distribution (default: all ManagedClusters except excludeManagedClusters; hub job lists clusters).
# - manifestwork: create/update ManifestWork in each managed cluster namespace (no kubeconfig). Independent of ACM Policy.
# - kubeconfig: use ACM import secret kubeconfigs (same as opp-policy-chart retrieval pattern).
distributeToSpokes: manifestwork

# ManifestWork metadata.name values (must be <=63 chars, DNS-1123).
manifestWork:
  nameOverride: ""
  proxyNameOverride: ""
  # Spokes should match the hub: set Proxy/cluster trustedCA to the merged bundle ConfigMap (default true).
  # Renders in the same ManifestWork as the bundle (strict apply order: optional klusterlet RBAC, ConfigMap, Proxy).
  # Legacy standalone Proxy ManifestWork name is MANIFEST_WORK_PROXY_NAME for delete-on-upgrade cleanup.
  patchClusterProxy: true
  # -- When true (default), prepend ClusterRole + ClusterRoleBinding on each spoke so klusterlet-work-sa can patch Proxy/cluster (ManifestWork SSA on OpenShift Proxy).
  grantKlusterletProxyPatchRBAC: true
  # -- Namespace of the spoke klusterlet work ServiceAccount (for ClusterRoleBinding subjects).
  klusterletWorkServiceAccountNamespace: open-cluster-management-agent
  # -- Name of the spoke klusterlet work ServiceAccount bound for Proxy patch.
  klusterletWorkServiceAccountName: klusterlet-work-sa

# Include Kubernetes/OpenShift API server trust (kube-apiserver-server-ca, kube-root-ca fallback,
# kubeconfig certificate-authority-data fallback for remote pulls, SA CA fallback for local/spoke push).
# -- Include API CA PEMs from hub/spokes in the merge (default true).
includeApiCA: true

# When true (default), merge default ingress router CA (openshift-ingress-operator/router-ca) for hub and spokes
# where the gather path can reach the spoke API.
# -- Include default ingress `router-ca` PEMs in the merge when hub/spoke API access allows.
includeIngressCA: true

# Include OpenShift platform/system trust bundle (openshift-config-managed/trusted-ca-bundle) for hub and spokes.
# Default false: keep merged bundle focused on API + ingress CAs unless you explicitly include platform trust.
# -- Include cluster system trust store (trusted-ca-bundle) from hub/spokes in addition to API and optional ingress CAs.
includeSystemTrustStore: false

# Wait until ManagedClusterConditionAvailable=True before touching a spoke.
waitForManagedClusterAvailable: true
clusterReadinessMaxAttempts: 150
clusterReadinessSleepSeconds: 30

# Vault is expected on the hub: hub API CAs (and optional ingress / system trust when enabled) are gathered into
