# GitHub's Pages builder always runs Jekyll (see actions/jekyll-build-pages); `.nojekyll`
# at the repo root does not skip that step. Prefer publishing from the `/docs` folder only
# (Settings → Pages → Build and deployment → Branch: main, Folder: /docs) so Jekyll never
# sees `charts/` or `site/`. This file still lists excludes if the publishing source is `/`.
#
# Jekyll 3: a custom `exclude` replaces the default array, so keep Jekyll 3.10 defaults here.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - charts
  - site
  - .github
  - scripts
