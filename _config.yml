# GitHub's Pages builder always runs Jekyll (see actions/jekyll-build-pages); `.nojekyll`
# does not skip that step. Helm/Ansible `{{ }}` in charts and npm READMEs under `site/`
# are parsed as Liquid and break the build — keep them out of Jekyll entirely.
#
# Jekyll 3 merges this file over defaults; a custom `exclude` replaces the default array,
# so reproduce Jekyll 3.10 defaults and add repo-specific paths.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - charts
  - site
  - .github
  - scripts
